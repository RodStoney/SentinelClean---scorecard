<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SentinelClean — Facility Audit Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c26;
    --surface2: #1e2330;
    --border: #2a2f3d;
    --accent: #00c2a8;
    --accent2: #0096ff;
    --warn: #f59e0b;
    --danger: #ef4444;
    --pass: #22c55e;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #545e6e;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* PASSWORD SCREEN */
  #password-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    flex-direction: column;
    gap: 24px;
  }
  .pw-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px;
    width: 360px;
    text-align: center;
  }
  .pw-logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .pw-logo span { color: var(--accent); }
  .pw-sub { color: var(--text2); font-size: 13px; margin-bottom: 28px; }
  .pw-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .pw-box input:focus { border-color: var(--accent); }
  .pw-box button {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 12px;
    color: #000;
    font-family: var(--font);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .pw-box button:hover { opacity: 0.85; }
  .pw-error { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }

  /* MAIN APP */
  #app { display: none; }
  
  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .logo span { color: var(--accent); }
  .logo small {
    font-size: 10px;
    font-weight: 400;
    color: var(--text2);
    margin-left: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: var(--mono);
  }
  .header-actions { display: flex; gap: 8px; }

  /* LAYOUT */
  .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

  /* TABS */
  .industry-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 24px;
    scrollbar-width: none;
  }
  .industry-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text2);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  /* META FIELDS */
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  @media (max-width: 600px) { .meta-grid { grid-template-columns: 1fr; } }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    margin-bottom: 6px;
    font-family: var(--mono);
  }
  .field input, .field select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }

  /* SCORE SUMMARY */
  .score-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .score-pct {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    font-family: var(--mono);
  }
  .score-pct.pass { color: var(--pass); }
  .score-pct.warn { color: var(--warn); }
  .score-pct.fail { color: var(--danger); }
  .score-details { flex: 1; }
  .score-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .progress-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
    background: var(--pass);
  }
  .progress-fill.warn { background: var(--warn); }
  .progress-fill.fail { background: var(--danger); }
  .score-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
  }
  .pill.pass { color: var(--pass); border-color: #22c55e40; background: #22c55e12; }
  .pill.flag { color: var(--warn); border-color: #f59e0b40; background: #f59e0b12; }
  .pill.fail { color: var(--danger); border-color: #ef444440; background: #ef444412; }
  .pill.na { color: var(--text3); border-color: var(--border); background: transparent; }

  /* HIGH RISK ALERT */
  .risk-alert {
    background: #ef444412;
    border: 1px solid #ef444440;
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #fca5a5;
    display: none;
  }
  .risk-alert strong { color: var(--danger); }

  /* CHECKLIST */
  .category-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .cat-header {
    padding: 14px 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    font-family: var(--mono);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cat-score-mini { font-size: 12px; color: var(--text3); }
  .checklist-item {
    display: flex;
    align-items: center;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    transition: background 0.1s;
  }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-item:hover { background: var(--surface2); }
  .item-label {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }
  .item-risk {
    font-size: 10px;
    font-weight: 600;
    font-family: var(--mono);
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .item-risk.HIGH { background: #ef444420; color: #fca5a5; border: 1px solid #ef444440; }
  .item-risk.MED { background: #f59e0b20; color: #fcd34d; border: 1px solid #f59e0b40; }
  .item-risk.LOW { background: #3b82f620; color: #93c5fd; border: 1px solid #3b82f640; }
  .score-btns {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .score-btn {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .score-btn:hover { border-color: var(--text2); color: var(--text); }
  .score-btn.active-pass { background: #22c55e20; border-color: var(--pass); color: var(--pass); }
  .score-btn.active-flag { background: #f59e0b20; border-color: var(--warn); color: var(--warn); }
  .score-btn.active-fail { background: #ef444420; border-color: var(--danger); color: var(--danger); }
  .score-btn.active-na { background: var(--surface2); border-color: var(--text3); color: var(--text2); }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: transparent; color: var(--text2); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }
  .btn-danger { background: transparent; color: var(--danger); border-color: #ef444440; }
  .btn-danger:hover { background: #ef444412; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* ACTIONS ROW */
  .actions-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    margin-top: 8px;
  }

  /* HISTORY */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    font-family: var(--mono);
    margin-bottom: 12px;
  }
  .history-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-meta { flex: 1; }
  .history-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .history-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .history-score { font-family: var(--mono); font-size: 16px; font-weight: 600; }
  .history-del {
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    padding: 4px 8px; border-radius: 6px;
    font-size: 16px;
    transition: color 0.15s;
  }
  .history-del:hover { color: var(--danger); }
  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text3);
    font-size: 13px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 9999;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* PRINT */
  @media print {
    #password-screen, header, .industry-tabs, .actions-row, .history-list, .section-title,
    .score-btns, .history-del, .toast, .tab-btn { display: none !important; }
    body { background: #fff; color: #000; }
    .container { padding: 0; max-width: 100%; }
    .score-bar, .category-block { border: 1px solid #ddd; background: #fff; }
    .cat-header { background: #f5f5f5; }
    .checklist-item { border-bottom: 1px solid #eee; }
    .item-label { color: #000; }
    .score-pct { color: #000 !important; }
    .risk-alert { display: block !important; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="password-screen">
  <div class="pw-box">
    <div class="pw-logo">Sentinel<span>Clean</span></div>
    <div class="pw-sub">Facility Audit Scorecard — Staff Access</div>
    <input type="password" id="pw-input" placeholder="Enter access password" />
    <button onclick="checkPassword()">Unlock →</button>
    <div class="pw-error" id="pw-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="logo">Sentinel<span>Clean</span> <small>Audit Scorecard</small></div>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" onclick="resetAudit()">↺ New Audit</button>
    </div>
  </header>

  <div class="container">
    <!-- Industry Tabs -->
    <div class="industry-tabs" id="industry-tabs"></div>

    <!-- Meta Fields -->
    <div class="meta-grid">
      <div class="field">
        <label>Client / Facility Name</label>
        <input type="text" id="f-client" placeholder="e.g. Sarasota Law Group" />
      </div>
      <div class="field">
        <label>Location / Address</label>
        <input type="text" id="f-location" placeholder="e.g. 123 Main St" />
      </div>
      <div class="field">
        <label>Auditor Name</label>
        <input type="text" id="f-auditor" placeholder="Your name" />
      </div>
    </div>

    <!-- Score Summary -->
    <div class="score-bar">
      <div class="score-pct" id="score-pct">—%</div>
      <div class="score-details">
        <div class="score-label" id="score-label">No items scored yet</div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="score-pills">
          <div class="pill pass" id="pill-pass">0 Pass</div>
          <div class="pill flag" id="pill-flag">0 Flag</div>
          <div class="pill fail" id="pill-fail">0 Fail</div>
          <div class="pill na" id="pill-na">0 N/A</div>
        </div>
      </div>
    </div>

    <!-- Risk Alert -->
    <div class="risk-alert" id="risk-alert"></div>

    <!-- Actions -->
    <div class="actions-row">
      <button class="btn btn-primary" onclick="saveAudit()">💾 Save Audit</button>
      <button class="btn btn-secondary" onclick="window.print()">🖨 Print Report</button>
      <button class="btn btn-secondary" onclick="copyEmailReport()">📋 Copy for Email</button>
    </div>

    <!-- Checklist -->
    <div id="checklist"></div>

    <!-- History -->
    <div class="section-title" style="margin-top:32px">Saved Audits</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── PASSWORD ───────────────────────────────────────────────────────────────
const APP_PASSWORD = 'sentinel2024';

function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === APP_PASSWORD) {
    document.getElementById('password-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentIndustry = 'medical';
let scores = {}; // { "category::item": 'pass'|'flag'|'fail'|'na' }

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function loadAudits() {
  try { return JSON.parse(localStorage.getItem('sc_audits') || '[]'); }
  catch { return []; }
}
function saveAudits(audits) {
  try { localStorage.setItem('sc_audits', JSON.stringify(audits.slice(-50))); }
  catch {}
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function initApp() {
  renderTabs();
  renderChecklist();
  renderHistory();
}

function renderTabs() {
  const container = document.getElementById('industry-tabs');
  container.innerHTML = '';
  Object.entries(industries).forEach(([key, ind]) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (key === currentIndustry ? ' active' : '');
    btn.textContent = ind.name;
    btn.onclick = () => switchIndustry(key);
    container.appendChild(btn);
  });
}

function switchIndustry(key) {
  currentIndustry = key;
  scores = {};
  renderTabs();
  renderChecklist();
  updateScore();
}

function renderChecklist() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';
  const industry = industries[currentIndustry];
  Object.entries(industry.categories).forEach(([cat, items]) => {
    const block = document.createElement('div');
    block.className = 'category-block';
    block.innerHTML = `
      <div class="cat-header">
        <span>${cat}</span>
        <span class="cat-score-mini" id="cat-${slugify(cat)}">—</span>
      </div>
    `;
    items.forEach((item, idx) => {
      const key = `${cat}::${idx}`;
      const row = document.createElement('div');
      row.className = 'checklist-item';
      row.innerHTML = `
        <div class="item-label">${item.label}</div>
        <span class="item-risk ${item.risk}">${item.risk}</span>
        <div class="score-btns">
          <button class="score-btn ${scores[key]==='pass'?'active-pass':''}" onclick="setScore('${escKey(key)}','pass')">PASS</button>
          <button class="score-btn ${scores[key]==='flag'?'active-flag':''}" onclick="setScore('${escKey(key)}','flag')">FLAG</button>
          <button class="score-btn ${scores[key]==='fail'?'active-fail':''}" onclick="setScore('${escKey(key)}','fail')">FAIL</button>
          <button class="score-btn ${scores[key]==='na'?'active-na':''}" onclick="setScore('${escKey(key)}','na')">N/A</button>
        </div>
      `;
      block.appendChild(row);
    });
    container.appendChild(block);
  });
}

function escKey(k) { return k.replace(/'/g, "\\'"); }
function slugify(s) { return s.replace(/[^a-z0-9]/gi, '_').toLowerCase(); }

function setScore(key, val) {
  scores[key] = val;
  // Re-render buttons for this item
  const industry = industries[currentIndustry];
  const allItems = [];
  Object.entries(industry.categories).forEach(([cat, items]) => {
    items.forEach((_, idx) => allItems.push(`${cat}::${idx}`));
  });
  const itemIndex = allItems.indexOf(key);
  const allRows = document.querySelectorAll('.checklist-item');
  if (allRows[itemIndex]) {
    const btns = allRows[itemIndex].querySelectorAll('.score-btn');
    btns.forEach((btn, i) => {
      const states = ['pass','flag','fail','na'];
      btn.className = 'score-btn' + (scores[key] === states[i] ? ` active-${states[i]}` : '');
    });
  }
  updateScore();
}

function updateScore() {
  const industry = industries[currentIndustry];
  let totalPass = 0, totalFlag = 0, totalFail = 0, totalNA = 0;
  let highRiskFails = [];

  Object.entries(industry.categories).forEach(([cat, items]) => {
    let catPass = 0, catFail = 0, catFlag = 0, catNA = 0;
    items.forEach((item, idx) => {
      const key = `${cat}::${idx}`;
      const s = scores[key];
      if (s === 'pass') { catPass++; totalPass++; }
      else if (s === 'flag') { catFlag++; totalFlag++; }
      else if (s === 'fail') {
        catFail++; totalFail++;
        if (item.risk === 'HIGH') highRiskFails.push(item.label);
      }
      else if (s === 'na') { catNA++; totalNA++; }
    });
    const catScored = catPass + catFlag + catFail;
    const catEl = document.getElementById('cat-' + slugify(cat));
    if (catEl) {
      catEl.textContent = catScored > 0 ? `${catPass}/${catScored} pass` : '—';
    }
  });

  const scored = totalPass + totalFlag + totalFail;
  const pct = scored > 0 ? Math.round((totalPass / scored) * 100) : null;

  const pctEl = document.getElementById('score-pct');
  const fillEl = document.getElementById('progress-fill');
  const labelEl = document.getElementById('score-label');

  if (pct === null) {
    pctEl.textContent = '—%';
    pctEl.className = 'score-pct';
    fillEl.style.width = '0%';
    fillEl.className = 'progress-fill';
    labelEl.textContent = 'No items scored yet';
  } else {
    pctEl.textContent = pct + '%';
    const cls = pct >= 90 ? 'pass' : pct >= 70 ? 'warn' : 'fail';
    pctEl.className = `score-pct ${cls}`;
    fillEl.style.width = pct + '%';
    fillEl.className = `progress-fill ${cls}`;
    labelEl.textContent = `${scored} of ${scored + totalNA} items scored`;
  }

  document.getElementById('pill-pass').textContent = `${totalPass} Pass`;
  document.getElementById('pill-flag').textContent = `${totalFlag} Flag`;
  document.getElementById('pill-fail').textContent = `${totalFail} Fail`;
  document.getElementById('pill-na').textContent = `${totalNA} N/A`;

  const alert = document.getElementById('risk-alert');
  if (highRiskFails.length > 0) {
    alert.style.display = 'block';
    alert.innerHTML = `<strong>⚠ ${highRiskFails.length} HIGH-RISK FAILURE${highRiskFails.length > 1 ? 'S' : ''}</strong>: ${highRiskFails.join(' · ')}`;
  } else {
    alert.style.display = 'none';
  }
}

// ─── SAVE / HISTORY ──────────────────────────────────────────────────────────
function saveAudit() {
  const client = document.getElementById('f-client').value.trim();
  const location = document.getElementById('f-location').value.trim();
  const auditor = document.getElementById('f-auditor').value.trim();

  const scored = Object.values(scores).filter(v => v !== 'na').length;
  if (scored === 0) { showToast('Score at least one item before saving.'); return; }

  const industry = industries[currentIndustry];
  const totalPass = Object.values(scores).filter(v => v === 'pass').length;
  const pct = Math.round((totalPass / scored) * 100);

  const audit = {
    id: Date.now(),
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
    industry: currentIndustry,
    industryName: industry.name,
    client, location, auditor,
    scores: { ...scores },
    pct
  };

  const audits = loadAudits();
  audits.push(audit);
  saveAudits(audits);
  renderHistory();
  showToast('Audit saved ✓');
}

function renderHistory() {
  const audits = loadAudits().reverse();
  const container = document.getElementById('history-list');
  if (audits.length === 0) {
    container.innerHTML = '<div class="empty-state">No saved audits yet. Complete and save an audit above.</div>';
    return;
  }
  container.innerHTML = '';
  audits.forEach(audit => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const cls = audit.pct >= 90 ? 'pass' : audit.pct >= 70 ? 'warn' : 'fail';
    const colors = { pass: 'var(--pass)', warn: 'var(--warn)', fail: 'var(--danger)' };
    item.innerHTML = `
      <div class="history-meta">
        <div class="history-name">${audit.client || 'Unnamed Client'} — ${audit.industryName}</div>
        <div class="history-sub">${audit.date} · ${audit.location || 'No location'} · ${audit.auditor || 'No auditor'}</div>
      </div>
      <div class="history-score" style="color:${colors[cls]}">${audit.pct}%</div>
      <button class="history-del" onclick="deleteAudit(${audit.id}, event)" title="Delete">×</button>
    `;
    item.addEventListener('click', () => loadAudit(audit));
    container.appendChild(item);
  });
}

function loadAudit(audit) {
  currentIndustry = audit.industry;
  scores = { ...audit.scores };
  document.getElementById('f-client').value = audit.client || '';
  document.getElementById('f-location').value = audit.location || '';
  document.getElementById('f-auditor').value = audit.auditor || '';
  renderTabs();
  renderChecklist();
  updateScore();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  showToast('Audit loaded ✓');
}

function deleteAudit(id, e) {
  e.stopPropagation();
  const audits = loadAudits().filter(a => a.id !== id);
  saveAudits(audits);
  renderHistory();
}

// ─── RESET ───────────────────────────────────────────────────────────────────
function resetAudit() {
  if (!confirm('Clear all scores and start a new audit?')) return;
  scores = {};
  document.getElementById('f-client').value = '';
  document.getElementById('f-location').value = '';
  document.getElementById('f-auditor').value = '';
  renderChecklist();
  updateScore();
}

// ─── EMAIL REPORT ─────────────────────────────────────────────────────────────
function copyEmailReport() {
  const client = document.getElementById('f-client').value.trim() || 'N/A';
  const location = document.getElementById('f-location').value.trim() || 'N/A';
  const auditor = document.getElementById('f-auditor').value.trim() || 'N/A';
  const industry = industries[currentIndustry];
  const date = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  const totalPass = Object.values(scores).filter(v => v === 'pass').length;
  const totalFlag = Object.values(scores).filter(v => v === 'flag').length;
  const totalFail = Object.values(scores).filter(v => v === 'fail').length;
  const totalNA = Object.values(scores).filter(v => v === 'na').length;
  const scored = totalPass + totalFlag + totalFail;
  const pct = scored > 0 ? Math.round((totalPass / scored) * 100) : 0;
  const status = pct >= 90 ? 'COMPLIANT' : pct >= 70 ? 'NEEDS ATTENTION' : 'NON-COMPLIANT';

  let report = `SENTINELCLEAN — FACILITY AUDIT REPORT\n`;
  report += `${'─'.repeat(44)}\n`;
  report += `Date: ${date}\n`;
  report += `Client: ${client}\n`;
  report += `Location: ${location}\n`;
  report += `Auditor: ${auditor}\n`;
  report += `Industry: ${industry.name}\n\n`;
  report += `OVERALL SCORE: ${pct}% — ${status}\n`;
  report += `Pass: ${totalPass}  |  Flag: ${totalFlag}  |  Fail: ${totalFail}  |  N/A: ${totalNA}\n\n`;

  Object.entries(industry.categories).forEach(([cat, items]) => {
    report += `${cat.toUpperCase()}\n`;
    items.forEach((item, idx) => {
      const key = `${cat}::${idx}`;
      const s = (scores[key] || '—').toUpperCase();
      const risk = item.risk;
      report += `  [${s.padEnd(4)}] ${item.label} (${risk})\n`;
    });
    report += '\n';
  });

  report += `─`.repeat(44) + '\n';
  report += `Generated by SentinelClean Audit System\n`;
  report += `scorecard.sarasotacleaning.com\n`;

  navigator.clipboard.writeText(report)
    .then(() => showToast('Report copied to clipboard ✓'))
    .catch(() => showToast('Copy failed — try Print instead'));
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
